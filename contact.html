<!-- CONTACT -->
<section id="contact" class="slide">
  <div class="contact-wrap">
    <div class="c-info">
      <h1>Get In<br><span style="color:aqua;">Touch</span></h1>
      <p>Have a project or just want to say hello? I'd love to hear from you!</p>
      <div class="c-row">
        <div class="c-icon">👤</div>
        <div class="c-text"><h4>Name</h4><p>MD. Zubair</p></div>
      </div>
      <div class="c-row">
        <div class="c-icon">📍</div>
        <div class="c-text"><h4>Location</h4><p>Amritapuri, Kerala, India</p></div>
      </div>
      <div class="c-row">
        <div class="c-icon">📞</div>
        <div class="c-text"><h4>Phone</h4><p>+91 77802 77607</p></div>
      </div>
      <div class="c-row">
        <div class="c-icon">✉️</div>
        <div class="c-text"><h4>Email</h4><p>yourname@email.com</p></div>
      </div>
      <div class="c-row">
        <div class="c-icon">🕐</div>
        <div class="c-text"><h4>Availability</h4><p>Mon–Sat, 9 AM – 7 PM IST</p></div>
      </div>
      <div class="socials">
        <a class="s-btn" href="#">GitHub</a>
        <a class="s-btn" href="#">LinkedIn</a>
        <a class="s-btn" href="#">Twitter</a>
      </div>
    </div>

    <div class="c-form">
      <input type="checkbox" id="sent">
      <div class="form-box">
        <h2>Send a <span>Message</span></h2>
        <div class="row2">
          <div class="fg">
            <label>First Name</label>
            <input type="text">
          </div>
          <div class="fg">
            <label>Last Name</label>
            <input type="text">
          </div>
        </div>
        <div class="fg">
          <label>Email</label>
          <input type="email">
        </div>
        <div class="fg">
          <label>Phone</label>
          <input type="tel">
        </div>
        <div class="fg">
          <label>Subject</label>
          <select>
            <option value="" disabled selected></option>
            <option>Hire Me / Freelance</option>
            <option>Collaboration</option>
            <option>Feedback</option>
            <option>Other</option>
          </select>
        </div>
        <div class="fg">
          <label>Message</label>
          <textarea></textarea>
        </div>
        <div class="f-btns">
          <label for="sent" class="sub-lbl"><span>🚀 Send Message</span></label>
          <label class="rst-lbl">🔄 Reset</label>
          <label for="s1" class="exit-lbl">✖ Close</label>
        </div>
      </div>
    </div>
  </div>
</section>
